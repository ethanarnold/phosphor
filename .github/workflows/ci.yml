name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run ruff check
        working-directory: backend
        run: poetry run ruff check .

      - name: Run ruff format check
        working-directory: backend
        run: poetry run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run mypy
        working-directory: backend
        run: poetry run mypy app --strict

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # `npm run build` is `tsc && vite build` — strict TS check happens here.
      - name: Build
        working-directory: frontend
        env:
          # Vite inlines VITE_* at build time; build-time placeholders are fine for CI.
          VITE_API_BASE: http://localhost:8000
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: phosphor
          POSTGRES_PASSWORD: phosphor
          POSTGRES_DB: phosphor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://phosphor:phosphor@localhost:5432/phosphor_test
          REDIS_URL: redis://localhost:6379/1
          CLERK_SECRET_KEY: test_secret
          ANTHROPIC_API_KEY: test_key
          ENVIRONMENT: test
        run: poetry run pytest --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run bandit (SAST)
        working-directory: backend
        run: poetry run bandit -r app -c pyproject.toml

      - name: Run pip-audit (dependency audit)
        working-directory: backend
        # CVE-2026-3219 affects pip itself (the runner's pip, not a project dep) and has no
        # fixed version yet — ignore until upstream ships a release. Revisit periodically.
        run: poetry run pip-audit --ignore-vuln CVE-2026-3219

  evals:
    name: Eval Harness
    runs-on: ubuntu-latest
    # Only run evals on main branch or when explicitly requested
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-evals')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install eval dependencies
        working-directory: evals
        run: poetry install --no-interaction

      - name: Run compression tests
        working-directory: evals
        run: poetry run pytest -m compression -v

      # Fidelity tests require API key - run only with secret available
      - name: Run fidelity tests
        if: env.ANTHROPIC_API_KEY != ''
        working-directory: evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: poetry run pytest -m fidelity -v

  docker-images:
    name: Docker Build (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            context: .
            file: ./Dockerfile
            tag: phosphor-backend:test
          - name: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            tag: phosphor-frontend:test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: false
          tags: ${{ matrix.image.tag }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  # Aggregate status check — keeps the existing "Docker Build" required check
  # green even though the actual builds run in a matrix. Branch protection
  # references this exact name; do not rename without updating protection rules.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: docker-images
    if: ${{ !cancelled() }}
    steps:
      - name: Verify matrix builds passed
        run: |
          if [ "${{ needs.docker-images.result }}" != "success" ]; then
            echo "Matrix build status: ${{ needs.docker-images.result }}"
            exit 1
          fi
